name: Run Web Proxy

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y socat
      
      - name: Create simple HTTP proxy with Python
        run: |
          # یک پروکسی HTTP بسیار ساده با Python (که از قبل نصب هست)
          cat > proxy.py << 'EOF'
          import socket
          import threading
          import sys
          
          def handle_client(client_socket):
              request = client_socket.recv(4096)
              if not request:
                  client_socket.close()
                  return
              
              # استخراج هاست و پورت از درخواست
              lines = request.decode('utf-8', errors='ignore').split('\n')
              if lines:
                  parts = lines[0].split(' ')
                  if len(parts) >= 2 and parts[0] == 'CONNECT':
                      host_port = parts[1].split(':')
                      host = host_port[0]
                      port = int(host_port[1]) if len(host_port) > 1 else 80
                      
                      # اتصال به سرور مقصد
                      server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      server.connect((host, port))
                      client_socket.send(b'HTTP/1.1 200 Connection Established\r\n\r\n')
                      
                      # هدایت ترافیک
                      threading.Thread(target=forward, args=(client_socket, server)).start()
                      forward(server, client_socket)
                  else:
                      # پروکسی HTTP ساده
                      client_socket.send(b'HTTP/1.1 200 OK\r\n\r\nProxy is working!')
              client_socket.close()
          
          def forward(source, dest):
              try:
                  while True:
                      data = source.recv(4096)
                      if not data:
                          break
                      dest.send(data)
              except:
                  pass
          
          def start_proxy(port):
              server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              server.bind(('0.0.0.0', port))
              server.listen(50)
              print(f"Proxy running on port {port}")
              
              while True:
                  client, addr = server.accept()
                  threading.Thread(target=handle_client, args=(client,)).start()
          
          if __name__ == '__main__':
              start_proxy(8080)
          EOF
          
          python3 proxy.py &
          sleep 3
          
          # نصب و اجرای bore
          curl -L -o bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          echo "✅ Tunnel URL will appear below:"
          ./bore local 8080 --to bore.pub
