name: Run Web Proxy with Cloudflare

on:
  workflow_dispatch:

jobs:
  run-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
      
      - name: Create HTTP Proxy with Python
        run: |
          # یک پروکسی HTTP ساده با پشتیبانی از CONNECT method
          cat > simple-proxy.py << 'EOF'
          import socket
          import threading
          import sys
          
          def handle_client(client_socket):
              request = client_socket.recv(4096)
              if not request:
                  client_socket.close()
                  return
              
              try:
                  # تلاش برای parse درخواست HTTP
                  first_line = request.split(b'\n')[0].decode('utf-8', errors='ignore')
                  
                  if first_line.startswith('CONNECT'):
                      # درخواست HTTPS
                      host_port = first_line.split(' ')[1].split(':')
                      host = host_port[0]
                      port = int(host_port[1]) if len(host_port) > 1 else 443
                      
                      server_socket = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      server_socket.connect((host, port))
                      client_socket.send(b'HTTP/1.1 200 Connection Established\r\n\r\n')
                      
                      # هدایت دوطرفه
                      threading.Thread(target=forward, args=(client_socket, server_socket)).start()
                      forward(server_socket, client_socket)
                  else:
                      # درخواست HTTP معمولی
                      client_socket.send(b'HTTP/1.1 200 OK\r\nContent-Type: text/html\r\n\r\n<html><body><h2>Proxy is Working!</h2><p>Use this as an HTTP proxy.</p></body></html>')
              except Exception as e:
                  print(f"Error: {e}")
              finally:
                  client_socket.close()
          
          def forward(source, dest):
              try:
                  while True:
                      data = source.recv(4096)
                      if not data:
                          break
                      dest.send(data)
              except:
                  pass
          
          def start_proxy(port):
              server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              server.bind(('0.0.0.0', port))
              server.listen(50)
              print(f"✅ HTTP Proxy running on port {port}")
              
              while True:
                  client, addr = server.accept()
                  print(f"Connection from {addr}")
                  threading.Thread(target=handle_client, args=(client,)).start()
          
          if __name__ == '__main__':
              start_proxy(8080)
          EOF
          
          python3 simple-proxy.py &
          sleep 3
          
          # ایجاد تونل با Cloudflare
          echo "🔄 Creating Cloudflare tunnel..."
          /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --metrics localhost:45678
